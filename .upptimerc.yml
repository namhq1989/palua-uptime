# .upptimerc.yml
# Docs: https://upptime.js.org/docs/configuration

siteName: Palua Status
owner: namhq1989
repo: palua-uptime
logoUrl: https://raw.githubusercontent.com/namhq1989/palua-uptime/master/logo.png

introTitle: "Palua Platform Status"
introMessage: |
  Uptime & health monitoring cho Palua backend.
  Cập nhật mỗi 5 phút bởi GitHub Actions.

# Cấu hình chung
allSites: true
skipDescriptionUpdate: true
skipTopicsUpdate: true
skipHomepageUpdate: false

# Cấu hình lịch sử & thống kê
daysInHistogram: 90
allTimezones: false
showMetrics: true

# Cấu hình thông báo (Slack)
# 1. Tạo Incoming Webhook: https://my.slack.com/services/new/incoming-webhook
# 2. Lưu vào repo Secret: UPPTIME_NOTIFICATION_SLACK
# 3. Đổi `enabled` từ false → true
notifications:
  - type: slack
    enabled: false # ← đổi thành true sau khi setup Slack webhook
    webhookUrl: $UPPTIME_NOTIFICATION_SLACK # ← secret trong repo
    channel: "#notification-uptime"
    sendAs: "Upptime Bot"

# Sites: 3 endpoint Palua
sites:
  # 1. Landing Page
  - name: Landing Page
    url: https://palua.app
    expectedStatusCodes:
      - 200

  # 2. App API (mobile app)
  - name: App API
    url: https://app-api.palua.app/health
    expectedStatusCodes:
      - 200

  # 3. Admin API (admin web)
  - name: Admin API
    url: https://adm-api.palua.app/health
    expectedStatusCodes:
      - 200

cname: status.palua.app
statusTypography: "updown"
